
api-port=8999
#api-ws-port=8999

app-no-restart=1
app-no-events=1

jobs-workers=2

app-path-views=tests
app-path-web=tests

api-static-views-^/render.html = render

api-redirect-login-^/app = /login.html?path=@PATH@
api-redirect-url = { "^/redirect.html": "http://127.0.0.1/@BASE@?@QUERY@" }

api-routing-auth-^/render = /render.html
api-routing-path-^/old/endpoint = /render.html

[roles=users]
api-acl-authenticated=auth
api-acl-add-auth=^/(auth|render)$
api-users-users={ "test": { "id": "test", "name": "test", "login": "test", "secret": "test" } }

[roles=csrf]
api-csrf-origin-^/(test|auth)$ = http://127.0.0.1:8999
api-csrf-sec-fetch-^/auth$ = cross-site,same-origin

[roles=redis]
cache-redis=redis://
queue-redis=redis://?bk-visibilityTimeout=500&bk-pollInterval=50
ipc-system-queue=redis
jobs-unique-cache=redis
jobs-worker-queue=redis

[roles=dbqueue]
db-pool=sqlite
db-sqlite-pool=/tmp/test
queue-dbqueue=db://?bk-visibilityTimeout=500&bk-pollInterval=50
jobs-worker-queue=dbqueue

[roles=nats]
queue-nats=nats://?bk-visibilityTimeout=500&bk-pollInterval=50
jobs-worker-queue=nats

[roles=redisevent]
queue-redis=redis://?bk-visibilityTimeout=500&bk-pollInterval=50
events-routing=redis:^TEST, redis@subject1: ^SUBJECT1
events-worker-queue = redis:events.testEvent, redis@subject1:events.testEvent

[roles=natsevent]
queue-nats=nats://?bk-visibilityTimeout=500&bk-pollInterval=50
events-routing=nats:^TEST, nats@subject1: ^SUBJECT1, nats@subject2: ^SUBJECT2
events-worker-queue = nats:events.testEvent, nats@subject1#group1:events.testEvent, nats@subject2#group2:events.testEvent

[roles=sqlite]
db-pool=sqlite
db-config=sqlite
db-sqlite-pool=/tmp/test

[roles=dynamodb]
db-pool=dynamodb
db-config=dynamodb
db-dynamodb-pool=http://localhost:8181

[roles=elasticsearch]
db-pool=elasticsearch
db-config=elasticsearch
db-elasticsearch-pool=default
db-elasticsearch-pool-tables=test1,test2,test3
db-elasticsearch-pool-options-defaultParams={"refresh":true}

[global]
