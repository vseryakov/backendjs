
api-port=8999
api-ws-port=8999

app-no-restart=1
app-no-events=1

jobs-workers=2

app-tmp-dir=var

app-path-web=var
app-path-web=tests

files-root=var

middleware-body-enable = true
middleware-body-timeout = 500

middleware-multipart-enable = true
middleware-static-enable = true

[roles=aws]
files-s3=bucket

[roles=users]
api-users-table = bk_user

api-acl-add-* = ^/(app|profile|logout)

api-acl-add-admin = ^/admin
api-acl-allow-admin = admin

api-acl-add-staff = ^/staff
api-acl-allow-staff = staff

api-acl-add-api = ^/api
api-acl-allow-api = api

middleware-users-enable = /app/*, /admin/*, /staff/*
middleware-users-login-redirect = /login.html
middleware-users-login-path = /login
middleware-users-logout-path = /logout
middleware-users-profile-path = /profile

middleware-users-enable-token = /api/*

[roles=static]
middleware-static-precompressed = /index.js
middleware-static-etag = true

middleware-routing-enable = true
middleware-routing-/redirect = 302/render.html
middleware-routing-/old/render = /render.html

[roles=csrf]
middleware-csrf-enable = true
middleware-csrf-origin-/test = http://127.0.0.1:8999
middleware-csrf-origin-/test = http://localhost:8999
middleware-csrf-sec-fetch-site-/test = cross-site,same-origin

[roles=csrf-fixed]
middleware-csrf-enable = fixed

[roles=limiter]
middleware-limiter-enable = true
middleware-limiter-ip-*-/api/* = rate:10
middleware-limiter-path-post-/api/* = rate:2
middleware-limiter-user-post-/api/user = rate:1

[roles=limiter-fixed]
middleware-limiter-enable = fixed

[roles=redis]
cache-redis=redis://
ipc-system-queue=redis
jobs-unique-cache=redis

[roles=local-uniq]
jobs-unique-cache=local

[roles=worker-uniq]
jobs-unique-cache=worker

[roles=worker-sys]
ipc-system-queue=worker

[roles=redis-jobs]
queue-redis=redis://?bk-visibilityTimeout=1000&bk-pollInterval=250
jobs-worker-queue=redis

[roles=db-jobs]
queue-dbqueue=db://?bk-visibilityTimeout=1000&bk-pollInterval=250
jobs-worker-queue=dbqueue

[roles=nats-jobs]
queue-nats=nats://?bk-visibilityTimeout=1000&bk-pollInterval=250
jobs-worker-queue=nats

[roles=sqs-jobs]
aws-sdk-profile=default
queue-sqs=sqs://tests?bk-visibilityTimeout=1000&bk-pollInterval=250&bk-timeout=2000
jobs-worker-queue=sqs

[roles=redis-events]
queue-redis=redis://?bk-visibilityTimeout=1000&bk-pollInterval=250
events-routing=redis:^TEST, redis.subject1: ^SUBJECT1, redis.subject2: ^SUBJECT2
events-worker-queue = redis:events.testEvent, redis.subject1:events.testEvent, redis.subject2:events.testEvent

[roles=nats-events]
queue-nats=nats://?bk-visibilityTimeout=1000&bk-pollInterval=250
events-routing=nats:^TEST, nats.subject1: ^SUBJECT1, nats.subject2: ^SUBJECT2
events-worker-queue = nats:events.testEvent, nats.subject1#group1:events.testEvent, nats.subject2#group2:events.testEvent

[roles=sqs-events]
aws-sdk-profile=default
queue-sqs=sqs://beta?bk-visibilityTimeout=1000&bk-pollInterval=250&bk-timeout=2000
events-routing=sqs:^TEST, sqs.subject1: ^SUBJECT1, sqs.subject2: ^SUBJECT2
events-worker-queue = sqs:events.testEvent, sqs.subject1:events.testEvent, sqs.subject2:events.testEvent

[roles=db-events]
queue-dbqueue=db://?bk-visibilityTimeout=1000&bk-pollInterval=250
jobs-worker-queue=dbqueue

[roles=sqlite]
db-pool=sqlite
db-sqlite-pool=var/test

[roles=rqlite]
db-pool=rqlite
db-rqlite-pool=default

[roles=postgres]
db-pool=postgres
db-postgres-pool=default

[roles=dynamodb]
db-pool=dynamodb
db-dynamodb-pool=http://localhost:8181

[roles=elasticsearch]
db-pool=elasticsearch
db-elasticsearch-pool=default
db-elasticsearch-pool-tables=bk_test
db-elasticsearch-pool-options-defaultParams={"refresh":true}

[roles=bench]
api-port = 3000
api-accesslog-disabled = 1
api-run-mode = none

[global]
