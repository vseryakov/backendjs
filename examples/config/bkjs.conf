
app-log=info

# connect to node repl to access web process
app-repl-port-web=2090

# redirect /app endpoints to the main index
api-routing-/app = /index.html
api-routing-/app/* = /index.html

# allow public access by /app route
api-acl-add-public=^/app

# create ACL named admins with access to our config endpoint
api-acl-add-admins=^/config

# allow users with admin role to access the admins ACL
api-acl-allow-admin=admins

# enable users module
api-users-cap-enabled = 1
api-acl-add-public = ^/login
api-acl-add-authenticated = ^/(auth|logout)

# Sqlite database
db-pool=sqlite
db-sqlite-pool=config

# Local DynamoDB
[roles=dynamodb]
db-pool=dynamodb
db-dynamodb-pool=http://localhost:8181

# Local PostgreSQL-like dbs
[roles=pg]
db-pool=pg
db-pg-pool=default

# Local Elasticsearch
[roles=es]
db-pool=elasticsearch
db-elasticsearch-pool=default

[global]

