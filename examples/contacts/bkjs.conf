app-log=info

# connect to node repl to access web process
app-repl-port-web=2090

# redirect /app endpoints to the main template
middleware-routing-enable = true
middleware-routing-/app = /index.html
middleware-routing-/app/* = /index.html

# parse static body globally
middleware-body-enable = true
middleware-static-enable = true
middleware-static-etag = true

files-root = var

# default db pool
db-sqlite-pool=var/contacts
db-pool=sqlite

[roles=pg]
db-pool=pg
db-pg-pool=default

[roles=dynamodb]
db-pool=dynamodb
db-dynamodb-pool=default

[roles=es]
db-pool=elasticsearch
db-elasticsearch-pool=default

[roles=rqlite]
db-pool=rqlite
db-rqlite-pool=default

[global]
