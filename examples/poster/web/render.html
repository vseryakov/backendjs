
<style type="text/css">
    .border-dashed {
        border-style: dashed;
    }
    .toast.danger > .toast-body {
        color: var(--bs-danger-text-emphasis);
        background-color: var(--bs-danger-bg-subtle);
    }
</style>

<div class="p-1">

    <div class="row mb-3">
        <div class="col-3">
            <label class="form-label fw-bolder">Profile</label>
            <div class="input-group">
                <input type="text" class="form-control" x-model="name">
            </div>
        </div>
    </div>

    <div class="text-muted small mb-3">
        - First image is the background, it must be large enough to fit other elements.<br>
        - Common defaults for all elements: <span class="dropdown" x-data="{ item: defaults }" x-template="'element-dropdown'"></span>
    </div>

    <div class="row">
        <div class="col-3">
            <form>
                <template x-for="(item, index) in items" :key="item.id" x-scope-level=1>
                    <div class="mb-3">
                        <label for="image" class="form-label fw-bolder" x-text="item.id"></label>

                        <div class="input-group" x-template="item.type + '-input'"></div>
                    </div>
                </template>

                <div class="mb-3">
                    <button class="btn btn-outline-dark" @click.stop.prevent="addItem"><i class="bi bi-plus"></i> Add</button>
                    <button class="btn btn-primary" @click.stop.prevent="render"><i class="bi bi-image"></i> Render</button>
                </div>
            </form>
        </div>

        <div class="col-9" id="right">
            <div class="card bg-light shadow-sm w-100 h-100">

                <div class="card-body" x-show="!_item&&_item!==null">
                    <div class="rounded p-2 w-100 h-100">
                        <img src="/img/1.png" id="poster" class="img-fluid" alt="Poster">
                    </div>
                </div>

                <template x-if="_item">
                    <div class="card-body w-100 h-100 overflow-y-auto" style="height: 75vh; max-height: 75vh">
                       <form x-data="{item:_item}" x-template="'element-form'"></form>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<datalist id="font-sizes">
    <option value="xx-small"></option>
    <option value="x-small"></option>
    <option value="small"></option>
    <option value="medium"></option>
    <option value="large"></option>
    <option value="x-large"></option>
    <option value="xx-large"></option>
</datalist>

<datalist id="font-list">
    <option value="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif">System (SF)</option>
    <option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica Neue</option>
    <option value="'Avenir Next', Avenir, sans-serif">Avenir</option>
    <option value="'Inter', sans-serif">Inter</option>
    <option value="'Futura', sans-serif">Futura</option>
    <option value="'Gill Sans', 'Gill Sans MT', sans-serif">Gill Sans</option>
    <option value="'Optima', sans-serif">Optima</option>
    <option value="'Palatino', 'Palatino Linotype', serif">Palatino</option>
    <option value="'Didot', serif">Didot</option>
    <option value="'American Typewriter', serif">American Typewriter</option>
    <option value="'Copperplate', 'Copperplate Gothic Light', serif">Copperplate</option>
    <option value="'Marker Felt', 'Comic Sans MS', cursive">Marker Felt</option>
    <option value="'Menlo', 'SF Mono', monospace">Menlo / SF Mono</option>
    <option value="'Montserrat', sans-serif" selected>Montserrat</option>
    <option value="'Playfair Display', serif">Playfair Display</option>
    <option value="'Roboto Slab', serif">Roboto Slab</option>
    <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
    <option value="'Pacifico', cursive">Pacifico</option>
</datalist>

<template id="element-dropdown">
    <button type="button" class="btn" @click="edit(item)">
        <i class="bi bi-gear"></i>
    </button>
</template>

<template id="element-form">
    <h4 x-text="item.id"></h4>

    <div class="row mb-3 pb-3 border-bottom" x-show="item.type=='image'">
        <label class="col-2 col-form-label">File</label>
        <div class="col-10">
            <div class="input-group flex-nowrap">
                <input type="text" readonly class="form-control-plaintext" :value="item.file">
                <button class="btn" type="button" title="Clear file" @click="item.file=item.data=undefined"><i class="bi bi-trash"></i></button>
            </div>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom" x-show="item.type=='text'">
        <label class="form-label">Text</label>
        <div class="col-10">
            <textarea class="form-control" rows=2 x-model="item.text"></textarea>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-3">
            <label class="form-label">Width</label>
            <input type="number" class="form-control" min="0" max="2000" x-model="item.width">
        </div>

        <div class="col-3">
            <label class="form-label">Height</label>
            <input type="number" class="form-control" min="0" max="2000" x-model="item.height">
        </div>

        <div class="col-3">
            <label class="form-label">Radius</span></label>
            <input type="number" class="form-control" min="0" max="10" x-model="item.radius">
        </div>

        <div class="col-3">
            <label class="form-label">Blur</label>
            <input class="form-control" x-model="item.blur_sigma" placeholder="sigma or auto">
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4">
            <label class="form-label">Gravity</label>
            <select class="form-select" x-model="item.gravity">
                <option selected value="">Choose...</option>
                <option>north</option>
                <option>south</option>
                <option>west</option>
                <option>center</option>
                <option>east</option>
                <option>northwest</option>
                <option>northeast</option>
                <option>southwest</option>
                <option>southeast</option>
            </select>
        </div>

        <div class="col-2">
            <label class="form-label">Left</label>
            <input type="number" class="form-control" min="0" max="2000" x-model="item.left">
        </div>

        <div class="col-2">
            <label class="form-label">Top</label>
            <input type="number" class="form-control" min="0" max="2000" x-model="item.top">
        </div>

        <div class="col-4">
            <label class="form-label">Blend</label>
            <select class="form-select" x-model="item.blend">
                <option selected value="">Choose...</option>
                <option value="clear">clear: Where the second object is drawn, the first is removed</option>
                <option value="source">source: The second object is drawn as if nothing were below</option>
                <option value="over">over: The image shows what you would expect if you held two semi-transparent slides on top of each other</option>
                <option value="in">in: The first object is removed completely, the second is only drawn where the first was</option>
                <option value="out">out: The second is drawn only where the first isn’t</option>
                <option value="atop">atop: This leaves the first object mostly intact, but mixes both objects in the overlapping area</option>
                <option value="dest">dest: Leaves the first object untouched, the second is discarded completely</option>
                <option value="dest-over">dest-over: Like OVER, but swaps the arguments</option>
                <option value="dest-in">dest-in: Like IN, but swaps the arguments</option>
                <option value="dest-out">dest-out: Like OUT, but swaps the arguments</option>
                <option value="dest-atop">dest-atop: Like ATOP, but swaps the arguments</option>
                <option value="xor">xor: Something like a difference operator</option>
                <option value="add">add: A bit like adding the two images</option>
                <option value="saturate">saturate: A bit like the darker of the two</option>
                <option value="multiply">multiply: At least as dark as the darker of the two inputs</option>
                <option value="screen">screen: At least as light as the lighter of the inputs</option>
                <option value="overlay">overlay: Multiplies or screens colors, depending on the lightness</option>
                <option value="darken">darken: The darker of each component</option>
                <option value="lighten">lighten: The lighter of each component</option>
                <option value="color-dodge">color-dodge: Brighten first by a factor second</option>
                <option value="color-burn">color-burn: Darken first by a factor of second</option>
                <option value="hard-light">hard-light: Multiply or screen, depending on lightness</option>
                <option value="soft-light">soft-light: Darken or lighten, depending on lightness</option>
                <option value="difference">difference: Difference of the two</option>
                <option value="exclusion">exclusion: Somewhat like DIFFERENCE, but lower-contrast</option>
            </select>
        </div>

    </div>

    <div class="row mb-3 pb-3 border-bottom" x-show="!item.type||item.type=='image'">
        <div class="col-4">
            <label class="form-label">Fit</label>
            <select class="form-select" x-model="item.fit">
                <option selected value="">Choose...</option>
                <option value="cover">cover: (default) Preserving aspect ratio, attempt to ensure the image covers both provided dimensions by cropping/clipping to fit.</option>
                <option value="contain">contain: Preserving aspect ratio, contain within both provided dimensions using "letterboxing" where necessary.</option>
                <option value="fill">fill: Ignore the aspect ratio of the input and stretch to both provided dimensions.</option>
                <option value="inside">inside: Preserving aspect ratio, resize the image to be as large as possible while ensuring its dimensions are less than or equal to both those specified.</option>
                <option value="outside">outside: Preserving aspect ratio, resize the image to be as small as possible while ensuring its dimensions are greater than or equal to both those specified.</option>
            </select>
        </div>

        <div class="col-4">
            <label class="form-label">Kernel</label>
            <select class="form-select" x-model="item.kernel">
                <option selected value="">Choose...</option>
                <option value="nearest">nearest: Use nearest neighbour interpolation.</option>
                <option value="linear">linear: Use a triangle filter.</option>
                <option value="cubic">cubic: Use a Catmull-Rom spline.</option>
                <option value="mitchell">mitchell: Use a Mitchell-Netravali spline.</option>
                <option value="lanczos2">lanczos2: Use a Lanczos kernel with a=2.</option>
                <option value="lanczos3">lanczos3: Use a Lanczos kernel with a=3 (the default).</option>
                <option value="mks2013">mks2013: Use a Magic Kernel Sharp 2013 kernel.</option>
                <option value="mks2021">mks2021: Use a Magic Kernel Sharp 2021 kernel.</option>
            </select>
        </div>

        <div class="col-4">
            <label class="form-label">Position</label>
            <select class="form-select" x-model="item.position">
                <option selected value="">Choose...</option>
                <option>north</option>
                <option>south</option>
                <option>west</option>
                <option>center</option>
                <option>east</option>
                <option>northwest</option>
                <option>northeast</option>
                <option>southwest</option>
                <option>southeast</option>
                <option value="entropy">entropy: focus on the region with the highest Shannon entropy.</option>
                <option value="attention">attention: focus on the region with the highest luminance frequency, color saturation and presence of skin tones.</option>
            </select>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-3">
            <label class="form-label">Padding</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding">
        </div>

        <div class="col-3">
            <label class="form-label">Padding Radius</span></label>
            <input type="number" class="form-control" min="0" max="10" x-model="item.padding_radius">
        </div>

        <div class="col-6">
            <div class="col-8" x-template="'color-input?id=padding_color&name=Padding+Color&prefix=padding_'"></div>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-2">
            <label class="form-label">Padding X</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_x">
        </div>

        <div class="col-2">
            <label class="form-label">Padding Y</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_y">
        </div>

        <div class="col-2">
            <label class="form-label">Padding T</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_top">
        </div>

        <div class="col-2">
            <label class="form-label">Padding B</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_bottom">
        </div>

        <div class="col-2">
            <label class="form-label">Padding L</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_left">
        </div>

        <div class="col-2">
            <label class="form-label">Padding R</span></label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.padding_right">
        </div>

    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-3">
            <label class="form-label">Border</label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.border">
        </div>

        <div class="col-3">
            <label class="form-label">Border Radius</span></label>
            <input type="number" class="form-control" min="0" max="10" x-model="item.border_radius">
        </div>

        <div class="col-6">
            <div class="col-8" x-template="'color-input?id=border_color&name=Border+Color&prefix=border_'"></div>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4">
            <label class="form-label">Gradient</label>
            <input class="form-control" x-model="item.gradient", placeholder="1, true, type, name,....">
        </div>

        <div class="col-4">
            <label class="form-label">Gradient Sigma</span></label>
            <input type="number" class="form-control" min="0" max="10" x-model="item.gradient_sigma">
        </div>

        <div class="col-4" x-template="'color-input?id=gradient_color&name=Gradient+Color'"></div>
    </div>

    <div x-template="!item.type||item.type=='text'?'font-form':''"></div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-3">
            <button class="btn btn-outline-dark me-2" @click.stop.prevent="if(!item.filters)item.filters=[];item.filters.push({name:'',value:''})">
                <i class="bi bi-transparency"></i> Add Filter
            </button>
        </div>
        <div class="col-9">
            <template x-for="(filter,index) in item.filters">
                <div class="row" py-2>
                    <div class="col-4">
                        <select class="form-select" x-model="filter.name">
                            <option selected value="">Choose...</option>
                            <template x-for="f in filters">
                                <option x-text="f.name" :selected="f.name==filter.name"></option>
                            </template>
                        </select>
                    </div>
                    <div class="col-6">
                        <input type="text" class="form-control" x-model="filter.value" placeholder="name:value,...">
                    </div>
                    <div class="col-1">
                        <i class="bi bi-trash p-1" @click="item.filters.splice(index,1)"></i>
                    </div>
            </template>
        </div>
    </div>

</template>

<template id="font-form">
    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4" x-template="'color-input?id=color&name=Text+Color'"></div>

        <div class="col-4">
            <label class="form-label">Color Detect Modes</label><br>
            <div class="input-group">
                <input class="form-control" list="detect-list" x-model="item.text_auto" placeholder="mode, mode,...." :title="item.text_auto">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><button class="dropdown-item" @click.stop.prevent="item.text_auto=''">Clear...</button></li>
                    <template x-for="type in ['luminance','dominant','complement','mean','lighter','darker','softlight']">
                        <li><button class="dropdown-item" @click.stop.prevent="item.text_auto=app.split(item.text_auto+','+$el.textContent)" x-text="type"></button></li>
                    </template>
                </ul>
            </div>
        </div>

        <div class="col-4" x-template="'color-input?id=bgcolor&name=Bg+Color&prefix=bg'"></div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-6">
            <label class="form-label">Font</label>
            <input class="form-control" list="font-list" x-model="item.font">
        </div>

        <div class="col-3">
            <label class="form-label">Font DPI</label>
            <input type="number" class="form-control" min="72" max="1000" x-model="item.dpi">
        </div>

        <div class="col-3" title="font size in 1024ths of a point, or in points (e.g. 12.5pt), or one of the absolute sizes, or a percentage (e.g. 200%), or one of the relative sizes smaller or larger">
            <label class="form-label">Font Size</label>
            <input class="form-control" list="font-sizes" x-model="item.size">
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4" title="text line height in points">
            <label class="form-label">Text height</label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.spacing">
        </div>

        <div class="col-4" title="Overrides the line height. The value can be either a factor (< 1024) that is used to scale up the logical extents of runs or an absolute value (in 1024th of a point)">
            <label class="form-label">Line height</label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.line_height">
        </div>

        <div class="col-4" title="Inter-letter spacing in 1024ths of a point.">
            <label class="form-label">Letter Spacing</label>
            <input type="number" class="form-control" min="0" max="1000" x-model="item.letter_spacing">
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4">
            <label class="form-label">Font Weight</label>
            <select class="form-select" x-model="item.weight">
                <option selected value="">Choose...</option>
                <option>normal</option>
                <option>light</option>
                <option>bold</option>
                <option>heavy</option>
            </select>
        </div>

        <div class="col-4">
            <label class="form-label">Font Style</label>
            <select class="form-select" x-model="item.style">
                <option selected value="">Choose...</option>
                <option>normal</option>
                <option>italic</option>
                <option>oblique</option>
            </select>
        </div>

        <div class="col-4">
            <label class="form-label">Font Stretch</label>
            <select class="form-select" x-model="item.stretch">
                <option selected value="">Choose...</option>
                <option>ultracondensed</option>
                <option>extracondensed</option>
                <option>condensed</option>
                <option>semicondensed</option>
                <option>normal</option>
                <option>semiexpanded</option>
                <option>expanded</option>
                <option>extraexpanded</option>
                <option>ultraexpanded</option>
            </select>
        </div>
    </div>

    <div class="row mb-3 pb-3 border-bottom">
        <div class="col-4">
            <label class="form-label">Text Align</label><br>
            <select class="form-select" x-model="item.align">
                <option selected value="">Choose...</option>
                <option>left</option>
                <option>center</option>
                <option>right</option>
            </select>
        </div>

        <div class="col-4">
            <label class="form-label">Text Wrap</label><br>
            <select class="form-select" x-model="item.wrap">
                <option selected value="">Choose...</option>
                <option>word</option>
                <option>char</option>
                <option>word-char</option>
                <option>none</option>
            </select>
        </div>
    </div>

</template>

<template id="image-input">
    <div class="form-control border-dashed p-2 d-flex align-content-center " x-file-drop="item" :class="{ 'border-primary': item._dragging }" >
        <small x-text="item.file ? item.gravity || 'center': 'Click or drag image here'"></small>
        <input type="file" :id="item.id" accept="image/*" class="d-none" @change="onFileDropped($event,item)" >
    </div>

    <span class="input-group-text px-2 py-0" x-template="'element-dropdown'"></span>
    <span class="input-group-text p-0 small">
        <i class="bi bi-arrow-up p-1" @click="if(index){items.splice(index,1);items.splice(index-1,0,item)}"></i>
        <i class="bi bi-arrow-down p-1" @click="if(index<items.length-1){items.splice(index,1);items.splice(index+1,0,item)}"></i>
        <i class="bi bi-trash p-1" @click="items.splice(index,1)"></i>
    </span>
</template>

<template id="text-input">
    <div class="form-control border-dashed p-2 d-flex align-content-center ">
        <small class="" x-text="item.gravity || 'center'"></small>
    </div>

    <span class="input-group-text px-2 py-0" x-template="'element-dropdown'"></span>
    <span class="input-group-text p-0 small">
        <i class="bi bi-arrow-up p-1" @click="if(index){items.splice(index,1);items.splice(index-1,0,item)}"></i>
        <i class="bi bi-arrow-down p-1" @click="if(index<items.length-1){items.splice(index,1);items.splice(index+1,0,item)}"></i>
        <i class="bi bi-trash p-1" @click="items.splice(index,1)"></i>
    </span>
</template>

<template id=color-input>
    <div class="d-flex d-column">
        <div class="me-3">
            <label class="form-label">
                <span x-text="$params.name"></span>
                <span x-text="item[$params.id]||'not set'" @click="item[$params.id]=undefined"></span>
            </label>
            <input type="color" class="form-control form-control-color" x-model="item[$params.id]">
        </div>

        <div class="me-1">
            <label class="form-label">Opacity % <span x-text="item[`${$params.prefix||''}alpha`]"></span></label>
            <input type="number" class="form-control" min="0" max="100" x-model="item[`${$params.prefix||''}alpha`]">
        </div>
    </div>
</template>
