
app-log=info

# connect to node repl to access web process
app-repl-port-web=2090

api-ws-port = 8000

# redirect /app endpoints to the main index
middleware-routing-enable = true
middleware-routing-/app = /index.html
middleware-routing-/app/* = /index.html

# parse static body globally
middleware-body-enable = true
middleware-static-enable = true
middleware-static-etag = true

files-root=var

# LLM config
#llm-temperature = 1
#llm-reasoning = high
#llm-max-tokens = 10000
#llm-system = you are coding assistant, produce only code, no comments and explanations

# Sqlite database
db-pool=sqlite
db-sqlite-pool=var/prompts

# start worker
jobs-workers=1
jobs-worker-queue=default
ipc-system-queue=worker

# sqlite queue
queue-default = db://?bk-visibilityTimeout=60000

# SQS queue
[roles=sqs]
queue-default = sqs://prompts

# AWS DynamoDB
[roles=dynamodb]
db-pool=dynamodb
db-dynamodb-pool = default

# Local DynamoDB
[roles=ddb]
db-pool=dynamodb
db-dynamodb-pool = http://localhost:8181

# Local PostgreSQL-like dbs
[roles=pg]
db-pool=pg
db-pg-pool=default

[global]

