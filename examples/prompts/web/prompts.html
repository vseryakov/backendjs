
<div class="p-2">

    <div class="d-flex justify-content-between align-items-center m-2">
        <h4 class="my-2">Prompts</h4>

        <div class="d-flex align-items-center">
            <button class="btn btn-primary text-nowrap me-3" @click="editModels()">
                <i class="bi bi-database"></i> Models
            </button>

            <button class="btn btn-primary text-nowrap me-3" @click="submit()">
                <i class="bi bi-plus-lg"></i> Add Prompt
            </button>

            <button class="btn btn-primary text-nowrap me-3" @click="refresh(1)">
                <i class="bi bi-arrow-repeat"></i> Refresh
            </button>
        </div>
    </div>

    <div class="p-2">
        <template x-for="prompt in prompts" :key="prompt.id">
            <div class="border rounded my-3 p-2" x-template="'prompt'"></div>
        </template>

        <template x-if="!prompts.length">
            <tr>
                <td colspan="4" class="text-center text-muted py-4">
                    No prompts created yet
                </td>
            </tr>
        </template>

        <template x-if="next_token">
            <tr>
                <td colspan="4" role=button class="text-center text-muted py-4" @click="refresh">
                    Load more
                </td>
            </tr>
        </template>
    </div>
</div>

<template id=prompt>
    <div class="row mb-3">
        <div class="col-8">
            <div class="text-truncate rounded p-2 bg-light" x-text="prompt.prompt"></div>
        </div>

        <div class="col-2">
            <span x-text="app.strftime(prompt.mtime)"></span>
        </div>

        <div class="col-2 text-end">
            <span class="text-muted mx-2" x-text="prompt.status"></span>
            <i class="bi bi-trash" @click=del(prompt)></i>
            <i class="bi bi-arrow-clockwise" @click=submit(prompt) title="Resubmit"></i>
        </div>
    </div>

    <div class="d-flex flex-wrap">
        <template x-for="result in app.isArray(prompt.results, [])" :key="result.model">
            <div class="m-2">
                <button class="rounded bg-light m-2 p-2" x-text="result.model" @click="show(prompt,result)" :class="result.error?'text-danger':''"></button>

                <div class="p-2 overflow-auto round border bg-light" x-show="result.show" style="max-width:45vw;max-height:65vh">
                    <div class="mb-3 border-bottom bg-dark text-light opacity-75">
                        <span x-text='"Tokens: " + JSON.stringify(result.stats||"").replace(/[{}"]/g, "")'></span>
                        <span x-text='"Similarity: " + JSON.stringify(result.similarity||"").replace(/[{}"]/g, "")'></span>
                    </div>

                    <pre class="" x-text="result.text||JSON.stringify(result.error)"></pre>
                </div>
            </div>
        </template>
    </div>

</template>
