<style>
.wrap {
    white-space: pre-wrap;
    overflow-wrap: break-word;
}
</style>

<div class="p-2">

    <div class="d-flex justify-content-between align-items-center m-2">
        <h4 class="my-2">Prompts</h4>

        <div class="d-flex align-items-center">
            <button class="btn btn-primary text-nowrap me-3" @click="editModels()">
                <i class="bi bi-database"></i> Models
            </button>

            <button class="btn btn-primary text-nowrap me-3" @click="submit()">
                <i class="bi bi-plus-lg"></i> Add Prompt
            </button>

            <button class="btn btn-primary text-nowrap me-3" @click="refresh(1)">
                <i class="bi bi-arrow-repeat"></i> Refresh
            </button>
        </div>
    </div>

    <div class="p-2">
        <template x-for="prompt in prompts" :key="prompt.id">
            <div class="border rounded my-3 p-2" x-template="'prompt'"></div>
        </template>

        <template x-if="!prompts.length">
            <tr>
                <td colspan="4" class="text-center text-muted py-4">
                    No prompts created yet
                </td>
            </tr>
        </template>

        <template x-if="next_token">
            <tr>
                <td colspan="4" role=button class="text-center text-muted py-4" @click="refresh">
                    Load more
                </td>
            </tr>
        </template>
    </div>
</div>

<template id=prompt>
    <div class="row mb-3">
        <div class="col-7">
            <pre class="text-bg-light rounded p-2" x-text="prompt.prompt" role="button" :class="prompt._show?'wrap':'text-truncate'" @click="prompt._show=!prompt._show"></pre>
        </div>

        <div class="col-2">
            <small class="" x-text="app.strftime(prompt.mtime)"></small>
        </div>

        <div class="col-3 text-end">
            <span class="text-muted mx-2" x-text="prompt.status"></span>
            <i class="bi bi-arrow-clockwise mx-2" @click=submit(prompt) title="Resubmit"></i>
            <i class="bi bi-arrows-expand mx-2" @click=toggle(prompt)></i>
            <i class="bi bi-arrows-collapse mx-2" @click=toggle(prompt,1)></i>
            <i class="bi bi-trash mx-2" @click=del(prompt)></i>
        </div>
    </div>

    <div class="d-flex flex-wrap">
        <template x-for="result in app.isArray(prompt.results, [])" :key="result.model">

            <div class="m-2" draggable="true" x-draggable="result" :class="{ 'dragover': result._dragover, 'dragging': result._dragging }">

                <button class="btn m-2 p-2" data-bs-toggle="button" x-text="result.model" @click="show(prompt,result)" :class="result.error?'btn-outline-danger':'btn-outline-success'"></button>

                <div class="text-bg-dark p-2 overflow-auto round border" x-show="result.width" :style="{maxWidth:result.width}" style="max-height:70vh">
                    <div class="mb-3 small opacity-75">

                        <div class="py-1 border-bottom text-danger" x-show="result.error">
                            <b>Error:</b> <span x-text="JSON.stringify(result.error)"></span>
                        </div>

                        <div class="py-1 border-bottom" >
                            <b>Stats:</b> <span x-text='JSON.stringify(result.stats||"").replace(/[{}"]/g, "").replace(/([:,])/g, "$1 ")'></span>
                        </div>

                        <div class="py-1 border-bottom" >
                            <b>Similarity:</b> <span x-text='JSON.stringify(result.similarity||"").replace(/[{}"]/g, "").replace(/([:,])/g, "$1 ")'></span>
                        </div>
                    </div>

                    <pre class="wrap md" x-shtml="result.width ? result.text: ''"></pre>
                </div>
            </div>
        </template>
    </div>

</template>
